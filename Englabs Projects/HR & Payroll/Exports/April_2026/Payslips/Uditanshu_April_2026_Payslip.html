
<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 50px; }
        .payslip { border: 1px solid #e2e8f0; padding: 40px; border-radius: 12px; max-width: 600px; margin: auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .total { font-weight: bold; font-size: 20px; color: #1e40af; border-top: 2px solid #e2e8f0; margin-top: 20px; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="payslip">
        <div class="header">
            <h2>Englabs India Pvt Ltd</h2>
            <p>Salary Slip | April 2026</p>
        </div>
        <div class="row"><span>Employee Name</span> <strong>Uditanshu</strong></div>
        <div class="row"><span>Working Days</span> <strong>28</strong></div>
        <div class="row"><span>Daily Rate</span> <strong>₹900</strong></div>
        <div class="row"><span>Basic Salary</span> <strong>₹25,200</strong></div>
        <div class="row"><span>Overtime Hours</span> <strong>11.94h</strong></div>
        <div class="row"><span>Overtime Pay</span> <strong>₹1,611.9</strong></div>
        <div class="total"><span>Net Payable Salary</span> <span>₹26,811.9</span></div>
    </div>
</body>
</html>
